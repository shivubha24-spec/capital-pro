<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Capital Pro</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f172a;
color:white;
text-align:center;
}

header{
background:#1e40af;
padding:20px;
font-size:30px;
font-weight:bold;
}

.hero{
padding:70px 20px;
}

.hero h1{
font-size:40px;
margin-bottom:15px;
}

.hero p{
font-size:18px;
color:#ddd;
margin-bottom:30px;
}

.btn{
display:inline-block;
background:#22c55e;
padding:15px 35px;
border-radius:8px;
color:white;
text-decoration:none;
font-size:20px;
font-weight:bold;
}

.cards{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
padding:40px 20px;
}

.card{
background:#1e293b;
padding:25px;
border-radius:15px;
width:280px;
}

.card h2{
margin-bottom:10px;
}

footer{
padding:20px;
background:#111827;
margin-top:40px;
}
</style>

</head>
<body>

<header>
Capital Pro
</header>

<section class="hero">
<h1>Welcome to Capital Pro</h1>
<p>Your trusted financial partner.</p>

<a href="#" class="btn">Get Started</a>
</section>

<section class="cards">

<div class="card">
<h2>Investment</h2>
<p>Grow your wealth with smart investment plans.</p>
</div>

<div class="card">
<h2>Loans</h2>
<p>Fast and secure personal & business loans.</p>
</div>

<div class="card">
<h2>Support</h2>
<p>24×7 customer support for all your needs.</p>
</div>

</section>

<footer>
© 2026 Capital Pro. All Rights Reserved.
</footer>

</body>
</html>
